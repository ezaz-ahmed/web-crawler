services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data-dev:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run dev:docker
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - '${PORT:-5000}:${PORT:-5000}'
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run dev:docker:worker
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json

volumes:
  redis-data-dev:
    driver: local
